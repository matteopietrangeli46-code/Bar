<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundBoard — Player Audio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
/* === DESIGN TOKENS === */
:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-error: #a12c7b;
  --font-body: 'Inter', sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #313b3b;
  --color-error: #d163a7;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}

/* === BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input { font: inherit; color: inherit; }
img, svg { display: block; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
a, button, [role="button"] {
  transition: color var(--transition-interactive), background var(--transition-interactive), box-shadow var(--transition-interactive);
}

/* === LAYOUT === */
.app-header {
  width: 100%;
  padding: var(--space-4) var(--space-6);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
  position: sticky;
  top: 0;
  z-index: 10;
}
.logo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--color-text);
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--color-primary);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { color: #fff; }
.theme-toggle {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
}
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

.main-content {
  width: 100%;
  max-width: 760px;
  padding: var(--space-8) var(--space-6);
  flex: 1;
}

/* === UPLOAD ZONE === */
.upload-zone {
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-10) var(--space-8);
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition-interactive), background var(--transition-interactive);
  background: var(--color-surface);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--color-primary);
  background: color-mix(in oklch, var(--color-primary) 5%, var(--color-surface));
}
.upload-zone input[type="file"] { display: none; }
.upload-icon { margin: 0 auto var(--space-4); color: var(--color-primary); }
.upload-zone h2 { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-2); }
.upload-zone p { color: var(--color-text-muted); font-size: var(--text-sm); }
.upload-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: var(--space-5);
  padding: var(--space-3) var(--space-5);
  background: var(--color-primary);
  color: #fff;
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: 600;
}
.upload-btn:hover { background: var(--color-primary-hover); }

/* === PLAYER CARD === */
.player-section { margin-top: var(--space-8); }
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-4);
}
.section-title { font-size: var(--text-lg); font-weight: 600; }
.track-count {
  font-size: var(--text-xs);
  background: var(--color-surface-offset);
  color: var(--color-text-muted);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
}
.player-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}

/* Now playing bar */
.now-playing {
  padding: var(--space-6) var(--space-6) var(--space-4);
  background: color-mix(in oklch, var(--color-primary) 8%, var(--color-surface));
  border-bottom: 1px solid var(--color-divider);
}
.now-playing-label {
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-primary);
  font-weight: 600;
  margin-bottom: var(--space-2);
}
.now-playing-title {
  font-size: var(--text-lg);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: var(--space-4);
}
.now-playing-title.empty { color: var(--color-text-muted); font-weight: 400; }

/* Progress bar */
.progress-container {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}
.time-label {
  font-size: var(--text-xs);
  font-variant-numeric: tabular-nums;
  color: var(--color-text-muted);
  min-width: 36px;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: var(--radius-full);
  width: 0%;
  transition: width 0.1s linear;
  pointer-events: none;
}
.progress-track input[type="range"] {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  margin: 0;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-4);
}
.ctrl-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-full);
  color: var(--color-text-muted);
  transition: all var(--transition-interactive);
}
.ctrl-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.ctrl-btn.active { color: var(--color-primary); }
.play-btn {
  width: 52px; height: 52px;
  background: var(--color-primary);
  color: #fff;
  border-radius: var(--radius-full);
  box-shadow: 0 4px 16px oklch(from var(--color-primary) l c h / 0.35);
}
.play-btn:hover { background: var(--color-primary-hover); }
.play-btn:active { transform: scale(0.96); }

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 0 var(--space-6) var(--space-4);
  margin-top: var(--space-3);
}
.vol-icon { color: var(--color-text-muted); flex-shrink: 0; }
.vol-slider {
  flex: 1;
  height: 3px;
  -webkit-appearance: none;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  cursor: pointer;
  accent-color: var(--color-primary);
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--color-primary);
  border-radius: 50%;
  cursor: pointer;
}

/* Track list */
.track-list {
  padding: var(--space-3) 0;
  max-height: 320px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}
.track-item {
  display: flex;
  align-items: center;
  padding: var(--space-3) var(--space-6);
  gap: var(--space-3);
  cursor: pointer;
  transition: background var(--transition-interactive);
  border-left: 3px solid transparent;
}
.track-item:hover { background: var(--color-surface-offset); }
.track-item.active {
  background: color-mix(in oklch, var(--color-primary) 6%, var(--color-surface));
  border-left-color: var(--color-primary);
}
.track-num {
  width: 24px;
  text-align: center;
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.track-item.active .track-num { display: none; }
.playing-anim {
  display: none;
  width: 24px;
  height: 16px;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.track-item.active .playing-anim { display: flex; }
.playing-anim span {
  display: block;
  width: 3px;
  background: var(--color-primary);
  border-radius: 2px;
  animation: sound-wave 1.2s ease-in-out infinite;
}
.playing-anim span:nth-child(1) { height: 6px; animation-delay: 0s; }
.playing-anim span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.playing-anim span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
.playing-anim span:nth-child(4) { height: 14px; animation-delay: 0.45s; }
.playing-anim.paused span { animation-play-state: paused; }
@keyframes sound-wave {
  0%, 100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1); }
}
.track-name {
  flex: 1;
  font-size: var(--text-sm);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-item.active .track-name { color: var(--color-primary); font-weight: 600; }
.track-duration {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.track-remove {
  opacity: 0;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--color-text-faint);
  flex-shrink: 0;
  transition: all var(--transition-interactive);
}
.track-item:hover .track-remove { opacity: 1; }
.track-remove:hover { background: var(--color-surface-dynamic); color: var(--color-error); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--space-12) var(--space-8);
  color: var(--color-text-muted);
}
.empty-icon { color: var(--color-text-faint); margin-bottom: var(--space-4); }
.empty-state h3 { font-size: var(--text-lg); font-weight: 600; color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { font-size: var(--text-sm); max-width: 36ch; }

/* Footer bar */
.footer-bar {
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-divider);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
}
.add-more-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}
.add-more-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: color-mix(in oklch, var(--color-primary) 5%, transparent); }
.clear-all-btn {
  font-size: var(--text-sm);
  color: var(--color-text-faint);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
}
.clear-all-btn:hover { color: var(--color-error); }

/* Hidden by default */
.player-section { display: none; }
.player-section.visible { display: block; }

/* Responsive */
@media (max-width: 480px) {
  .main-content { padding: var(--space-6) var(--space-4); }
  .controls { gap: var(--space-3); }
  .play-btn { width: 48px; height: 48px; }
  .track-item { padding-left: var(--space-4); padding-right: var(--space-4); }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    SoundBoard
  </div>
  <button class="theme-toggle" data-theme-toggle aria-label="Cambia tema">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<main class="main-content">

  <!-- Upload Zone -->
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" multiple accept="audio/*,.mp3,.wav,.ogg,.flac,.m4a,.aac">
    <div class="upload-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <h2>Trascina i tuoi file audio qui</h2>
    <p>Supporta MP3, WAV, FLAC, OGG, M4A, AAC e altri formati</p>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      Scegli file
    </button>
  </div>

  <!-- Player Section (hidden until tracks loaded) -->
  <section class="player-section" id="playerSection">
    <div class="section-header">
      <span class="section-title">Libreria</span>
      <span class="track-count" id="trackCount">0 brani</span>
    </div>

    <div class="player-card">
      <!-- Now Playing -->
      <div class="now-playing">
        <div class="now-playing-label">In riproduzione</div>
        <div class="now-playing-title empty" id="trackTitle">Nessun brano selezionato</div>
        <div class="progress-container">
          <span class="time-label" id="currentTime">0:00</span>
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
            <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
          </div>
          <span class="time-label" id="totalTime">0:00</span>
        </div>
        <div class="controls">
          <button class="ctrl-btn" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          </button>
          <button class="ctrl-btn" id="prevBtn" aria-label="Precedente">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play/Pausa">
            <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" id="nextBtn" aria-label="Successivo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="ctrl-btn" id="repeatBtn" aria-label="Ripeti" title="Ripeti">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>
      </div>

      <!-- Volume -->
      <div class="volume-row">
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <input type="range" class="vol-slider" id="volumeSlider" min="0" max="1" step="0.02" value="1">
      </div>

      <!-- Track List -->
      <div class="track-list" id="trackList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <h3>Nessun brano ancora</h3>
          <p>Carica dei file audio per iniziare ad ascoltare</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer-bar">
        <button class="add-more-btn" onclick="document.getElementById('fileInput').click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Aggiungi brani
        </button>
        <button class="clear-all-btn" id="clearAllBtn">Rimuovi tutti</button>
      </div>
    </div>
  </section>

</main>

<audio id="audioPlayer"></audio>

<script>
(function () {
  // Theme toggle
  const themeToggle = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let currentTheme = 'dark';
  root.setAttribute('data-theme', currentTheme);
  themeToggle.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  themeToggle.addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', currentTheme);
    themeToggle.innerHTML = currentTheme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });

  // State
  const tracks = [];
  let currentIndex = -1;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat = false;
  let shuffleOrder = [];

  // DOM
  const audio = document.getElementById('audioPlayer');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const repeatBtn = document.getElementById('repeatBtn');
  const trackTitle = document.getElementById('trackTitle');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const progressFill = document.getElementById('progressFill');
  const seekBar = document.getElementById('seekBar');
  const volumeSlider = document.getElementById('volumeSlider');
  const trackList = document.getElementById('trackList');
  const emptyState = document.getElementById('emptyState');
  const trackCount = document.getElementById('trackCount');
  const playerSection = document.getElementById('playerSection');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');

  // File input
  fileInput.addEventListener('change', e => handleFiles(Array.from(e.target.files)));

  // Drag and drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|ogg|flac|m4a|aac)$/i.test(f.name)));
  });

  function handleFiles(files) {
    if (!files.length) return;
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      const name = file.name.replace(/\.[^/.]+$/, '');
      tracks.push({ name, url, file, duration: null });
      loadDuration(tracks.length - 1, url);
    });
    renderTrackList();
    playerSection.classList.add('visible');
    if (currentIndex === -1) loadTrack(0);
    fileInput.value = '';
  }

  function loadDuration(index, url) {
    const tmp = new Audio(url);
    tmp.addEventListener('loadedmetadata', () => {
      tracks[index].duration = tmp.duration;
      const item = trackList.querySelector(`[data-index="${index}"] .track-duration`);
      if (item) item.textContent = formatTime(tmp.duration);
    });
  }

  function renderTrackList() {
    const existingItems = trackList.querySelectorAll('.track-item');
    existingItems.forEach(el => el.remove());
    emptyState.style.display = tracks.length ? 'none' : 'flex';
    tracks.forEach((track, i) => {
      const item = document.createElement('div');
      item.className = 'track-item' + (i === currentIndex ? ' active' : '');
      item.setAttribute('data-index', i);
      item.innerHTML = `
        <span class="track-num">${i + 1}</span>
        <div class="playing-anim${!isPlaying && i === currentIndex ? ' paused' : ''}">
          <span></span><span></span><span></span><span></span>
        </div>
        <span class="track-name">${escapeHtml(track.name)}</span>
        <span class="track-duration">${track.duration ? formatTime(track.duration) : '—'}</span>
        <button class="track-remove" title="Rimuovi" onclick="removeTrack(${i}, event)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      item.addEventListener('click', () => loadTrack(i, true));
      trackList.appendChild(item);
    });
    updateTrackCount();
  }

  function updateTrackCount() {
    const n = tracks.length;
    trackCount.textContent = n === 0 ? '0 brani' : n === 1 ? '1 brano' : `${n} brani`;
  }

  function loadTrack(index, autoplay = false) {
    if (index < 0 || index >= tracks.length) return;
    currentIndex = index;
    const track = tracks[index];
    audio.src = track.url;
    trackTitle.textContent = track.name;
    trackTitle.classList.remove('empty');
    renderTrackList();
    if (autoplay) {
      audio.play().then(() => setPlayState(true)).catch(() => {});
    } else if (isPlaying) {
      audio.play().then(() => setPlayState(true)).catch(() => {});
    } else {
      setPlayState(false);
    }
  }

  function setPlayState(playing) {
    isPlaying = playing;
    playIcon.style.display = playing ? 'none' : 'block';
    pauseIcon.style.display = playing ? 'block' : 'none';
    const anim = trackList.querySelector('.track-item.active .playing-anim');
    if (anim) anim.classList.toggle('paused', !playing);
  }

  playBtn.addEventListener('click', () => {
    if (currentIndex === -1 && tracks.length) loadTrack(0, true);
    else if (isPlaying) { audio.pause(); setPlayState(false); }
    else { audio.play().then(() => setPlayState(true)).catch(() => {}); }
  });

  nextBtn.addEventListener('click', () => playNext());
  prevBtn.addEventListener('click', () => {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    playPrev();
  });

  function playNext() {
    if (!tracks.length) return;
    let next;
    if (isShuffle) {
      const others = tracks.map((_, i) => i).filter(i => i !== currentIndex);
      next = others.length ? others[Math.floor(Math.random() * others.length)] : currentIndex;
    } else {
      next = (currentIndex + 1) % tracks.length;
    }
    loadTrack(next, isPlaying);
  }

  function playPrev() {
    if (!tracks.length) return;
    let prev;
    if (isShuffle) {
      const others = tracks.map((_, i) => i).filter(i => i !== currentIndex);
      prev = others.length ? others[Math.floor(Math.random() * others.length)] : currentIndex;
    } else {
      prev = (currentIndex - 1 + tracks.length) % tracks.length;
    }
    loadTrack(prev, isPlaying);
  }

  shuffleBtn.addEventListener('click', () => {
    isShuffle = !isShuffle;
    shuffleBtn.classList.toggle('active', isShuffle);
  });
  repeatBtn.addEventListener('click', () => {
    isRepeat = !isRepeat;
    repeatBtn.classList.toggle('active', isRepeat);
  });

  // Progress
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    seekBar.value = pct;
    currentTimeEl.textContent = formatTime(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = formatTime(audio.duration);
    // Update duration in track list
    if (tracks[currentIndex]) {
      tracks[currentIndex].duration = audio.duration;
      const el = trackList.querySelector(`[data-index="${currentIndex}"] .track-duration`);
      if (el) el.textContent = formatTime(audio.duration);
    }
  });
  audio.addEventListener('ended', () => {
    if (isRepeat) { audio.currentTime = 0; audio.play(); }
    else playNext();
  });
  seekBar.addEventListener('input', () => {
    if (audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration;
  });
  volumeSlider.addEventListener('input', () => { audio.volume = volumeSlider.value; });

  // Remove track
  window.removeTrack = function(index, e) {
    e.stopPropagation();
    URL.revokeObjectURL(tracks[index].url);
    tracks.splice(index, 1);
    if (currentIndex === index) {
      audio.pause(); setPlayState(false);
      if (tracks.length) { loadTrack(Math.min(index, tracks.length - 1)); }
      else {
        currentIndex = -1;
        audio.src = '';
        trackTitle.textContent = 'Nessun brano selezionato';
        trackTitle.classList.add('empty');
        currentTimeEl.textContent = '0:00';
        totalTimeEl.textContent = '0:00';
        progressFill.style.width = '0%';
        playerSection.classList.remove('visible');
      }
    } else if (currentIndex > index) { currentIndex--; }
    renderTrackList();
  };

  clearAllBtn.addEventListener('click', () => {
    tracks.forEach(t => URL.revokeObjectURL(t.url));
    tracks.length = 0;
    currentIndex = -1;
    audio.pause(); audio.src = '';
    setPlayState(false);
    trackTitle.textContent = 'Nessun brano selezionato';
    trackTitle.classList.add('empty');
    currentTimeEl.textContent = '0:00';
    totalTimeEl.textContent = '0:00';
    progressFill.style.width = '0%';
    renderTrackList();
    playerSection.classList.remove('visible');
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    if (e.code === 'ArrowRight') { e.preventDefault(); audio.currentTime = Math.min(audio.currentTime + 5, audio.duration || 0); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); audio.currentTime = Math.max(audio.currentTime - 5, 0); }
    if (e.code === 'ArrowUp') { e.preventDefault(); volumeSlider.value = Math.min(+volumeSlider.value + 0.1, 1); audio.volume = volumeSlider.value; }
    if (e.code === 'ArrowDown') { e.preventDefault(); volumeSlider.value = Math.max(+volumeSlider.value - 0.1, 0); audio.volume = volumeSlider.value; }
    if (e.code === 'KeyN') playNext();
    if (e.code === 'KeyP') playPrev();
  });

  function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
